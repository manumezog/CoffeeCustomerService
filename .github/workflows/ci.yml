name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'shop/**'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'shop/package-lock.json'

    - name: Install dependencies
      run: cd shop && npm ci

    - name: Run type check
      run: cd shop && npm run build 2>&1 | head -50 || true

    - name: Run ESLint
      run: cd shop && npx eslint src --max-warnings 10 || true
