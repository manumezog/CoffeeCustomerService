product_catalog_task:
  description: >
    Define the product catalog structure for Ember & Roast. Create a detailed product schema
    that includes: name, origin, roast level, price, description, flavor notes, brew recommendations.
    Define 8-10 specialty coffee products with rich details. Consider pricing strategy,
    product categories (single origin, blends, subscriptions, bundles), and customer appeal.
  expected_output: >
    A detailed product_requirements.md file that includes:
    - Product schema definition (fields, types, validations)
    - 8 specialty coffee products with full details
    - Pricing strategy and reasoning
    - Product categories and grouping
    - Seasonal/limited edition strategy
  agent: product_manager

user_stories_task:
  description: >
    Write comprehensive user stories and acceptance criteria for the Ember & Roast shop.
    Focus on the core flows: browsing products, managing cart, checkout, order tracking,
    returns, and customer service interactions. Each story should be testable and specific.
    Organize into epics: Product Catalog, Shopping Cart, Checkout, Order Management, Customer Service.
  expected_output: >
    A user_stories.md file organized by epic with clear user stories in the format:
    "As a [user type], I want to [action], so that [benefit]"
    Each story should include acceptance criteria, priority, and estimation points.
  agent: product_manager

design_system_task:
  description: >
    Create a comprehensive design system for Ember & Roast. Define:
    - Color palette (primary roast browns, warm accents, cream backgrounds)
    - Typography (font family, sizes, weights, line heights)
    - Spacing system (margins, padding, gaps)
    - Component library (buttons, inputs, cards, modals)
    - Interaction patterns (hover, focus, loading, error states)
    - Dark mode strategy (if applicable)
    The design should feel premium, warm, and artisanal while remaining modern and accessible.
  expected_output: >
    A design_system.md file that includes:
    - Color palette with hex codes and usage guidelines
    - Typography scale with all sizes and weights
    - Spacing scale
    - Component specifications (buttons, inputs, cards, etc.)
    - Accessibility guidelines (contrast ratios, focus states)
    - Example component sketches or descriptions
  agent: ui_designer

page_layouts_task:
  description: >
    Design detailed layouts for all pages of the Ember & Roast shop:
    - Homepage (hero, featured products, newsletter signup)
    - Product Catalog (grid, filters, search)
    - Product Detail (images, description, reviews, add to cart)
    - Cart (items, quantities, prices, checkout button)
    - Checkout (address, payment, order summary)
    - Order Tracking (order details, status, tracking)
    - Customer Service widgets (webchat, call button)

    Include responsive design considerations for mobile, tablet, desktop.
  expected_output: >
    A page_layouts.md file with:
    - Wireframe descriptions for each page
    - Component breakdown for each page
    - Responsive behavior notes
    - Key interactions and states
    - Navigation flows
  agent: ui_designer

product_api_task:
  description: >
    Design and create the product catalog API. Create a JSON file with all product data
    following the product schema defined by the PM. The API should support:
    - GET /products (list all with pagination)
    - GET /products/:id (single product)
    - Filtering by roast level, origin, price range
    - Sorting by name, price, popularity

    Create realistic product data for 8 specialty coffees with engaging descriptions,
    accurate pricing, and meaningful attributes.
  expected_output: >
    Complete products.json file with all 8 products properly formatted,
    and a products.ts data access layer file showing how the API would work.
  agent: backend_engineer

orders_database_task:
  description: >
    Design the orders and order items data model for Ember & Roast. Define:
    - Order schema (id, customer, items, status, dates, shipping address, total)
    - Order statuses (confirmed, roasting, shipped, delivered, return_requested, refunded)
    - Order items (product reference, quantity, price at purchase)
    - Customer schema (minimal for this demo)

    Create sample order data in 5 orders in various states to demonstrate the system:
    - One recently placed (roasting)
    - One shipped with tracking
    - One delivered
    - One with return requested
    - One processing
  expected_output: >
    Complete orders.json with 5+ sample orders and an orders.ts file showing
    how order management would work in the API. Include proper TypeScript types.
  agent: backend_engineer

api_routes_task:
  description: >
    Define the API route structure and implementation strategy for Ember & Roast.
    Key routes needed:
    - POST /api/orders - create new order
    - GET /api/orders/:id - get order details
    - PATCH /api/orders/:id - update order (for returns, etc.)
    - GET /api/products - list products
    - GET /api/products/:id - get product

    Also plan for customer service routes that will be built later:
    - POST /api/cs/webhook - for webchat integration
    - POST /api/retell - for voice AI webhook
    - POST /api/cs/escalation - for human handoff

    Provide route definitions with request/response schemas.
  expected_output: >
    An api_routes.md file defining all routes with:
    - HTTP method and path
    - Request/response schemas
    - Status codes and error handling
    - Integration points with frontend
  agent: backend_engineer

ui_components_task:
  description: >
    Build the reusable UI component library for Ember & Roast using React/TypeScript
    and Tailwind CSS. Create these components:
    - ProductCard (displays product with image, name, price, add to cart)
    - ProductGrid (displays list of products in responsive grid)
    - Button (primary, secondary, sizes, states)
    - Input/TextField (with labels, error states, validation)
    - Card (generic container component)
    - Badge (for roast level, origin, etc.)
    - PriceTag (formatted price display)

    All components should follow the design system and be accessible.
    Provide TypeScript interfaces for props.
  expected_output: >
    Multiple .tsx component files in src/components/ with:
    - Functional React components with TypeScript
    - Proper props interfaces
    - Tailwind styling matching design system
    - Accessibility attributes (aria-*, role, etc.)
  agent: frontend_engineer

product_pages_task:
  description: >
    Build the product catalog pages for the Ember & Roast store:
    - /products - Product listing page with grid, filters, search
    - /products/:id - Product detail page with full information

    Use the ProductCard and ProductGrid components. Fetch product data from the API.
    Implement filtering by roast level and price range. Add "Add to Cart" functionality.
    Include responsive design for mobile.
  expected_output: >
    Completed page.tsx files for /products and /products/:id routes
    with full product browsing functionality and responsive design.
  agent: frontend_engineer

homepage_task:
  description: >
    Build the Ember & Roast homepage. The homepage should:
    - Include a hero section with brand story and call-to-action
    - Showcase featured products
    - Include newsletter signup section
    - Link to main shop pages
    - Include footer with links and info

    Design should feel premium and warm, introducing customers to the brand
    and getting them excited about specialty coffee.
  expected_output: >
    A completed src/app/page.tsx (or src/pages/index.tsx) with:
    - Hero section
    - Featured products section
    - Newsletter signup
    - Navigation and branding
    - Responsive design
    - Tailwind styling matching design system
  agent: frontend_engineer
